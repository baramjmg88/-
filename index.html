<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>차종표 실시간 검색기</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        body { font-family: 'Malgun Gothic', '맑은 고딕', sans-serif; margin: 40px; background-color: #f8fafc; color: #334155; }
        .container { max-width: 1100px; margin: 0 auto; }
        h2 { text-align: center; color: #0f172a; margin-bottom: 25px; font-size: 28px; }
        
        /* 검색창 스타일 */
        .search-box { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); margin-bottom: 25px; }
        input[type="text"] { width: 100%; padding: 14px 20px; font-size: 16px; border: 1px solid #cbd5e1; border-radius: 8px; box-sizing: border-box; outline: none; transition: all 0.2s; }
        input[type="text"]:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15); }
        
        /* 테이블 스타일 */
        .table-container { background: white; border-radius: 12px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th, td { padding: 14px 20px; border-bottom: 1px solid #e2e8f0; font-size: 15px; }
        
        /* 상단 헤더 고정 및 강조 */
        th { background-color: #1e293b; color: #f8fafc; font-weight: 600; position: sticky; top: 0; }
        
        /* 행 디자인 및 호버 효과 */
        tr:last-child td { border-bottom: none; }
        tr:nth-child(even) { background-color: #f8fafc; }
        tr:hover { background-color: #f1f5f9; }
        
        /* 상태 메시지 */
        .status-msg { text-align: center; padding: 40px; color: #64748b; font-size: 16px; }
    </style>
</head>
<body>

<div class="container">
    <h2>🚗 차종표 실시간 검색 서비스</h2>
    
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="브랜드, 품번, 차명, 또는 비고를 입력하세요 (예: 아반떼, 05-01, 2026)..." disabled>
    </div>

    <div class="table-container">
        <table id="resultTable">
            <thead id="tableHead"></thead>
            <tbody id="tableBody">
                <tr><td class="status-msg">구글 스프레드시트에서 차종 데이터를 가져오는 중입니다...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    // 제공해주신 웹 게시용 주소에 CORS(보안 제한) 우회 처리를 적용한 최종 주소입니다.
    const googleSheetCsvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vS2Ge98aDBRGE-5gWXBb8PXOye9Ev6BPmefvtpVLIFa_8mnRVg45ZiZYuPUyJD0mc7kjvzLOBTS-6yZ/pub?gid=0&single=true&output=csv";

    let carData = [];

    window.onload = function() {
        // 구글 시트 원격 CSV 데이터 파싱
        Papa.parse(googleSheetCsvUrl, {
            download: true,
            header: true, 
            skipEmptyLines: true,
            complete: function(results) {
                carData = results.data;
                // 성공적으로 로드되면 검색창 활성화 및 테이블 렌더링
                document.getElementById('searchInput').disabled = false;
                renderTable(carData);
            },
            error: function(err) {
                document.getElementById('tableBody').innerHTML = `<tr><td class="status-msg" style="color:#ef4444;">데이터 로드 실패. 구글 시트 주소 접근에 실패했습니다.</td></tr>`;
            }
        });
    };

    // 실시간 통합 검색 (브랜드, 품번, 차명, 비고 구분 없이 모두 매칭)
    document.getElementById('searchInput').addEventListener('input', function(e) {
        const keyword = e.target.value.toLowerCase().trim();
        
        if (!keyword) { 
            renderTable(carData); 
            return; 
        }

        const filtered = carData.filter(row => {
            return Object.values(row).some(val => String(val).toLowerCase().includes(keyword));
        });
        
        renderTable(filtered);
    });

    // 테이블 화면 렌더링 함수
    function renderTable(data) {
        const thead = document.getElementById('tableHead');
        const tbody = document.getElementById('tableBody');
        thead.innerHTML = ''; 
        tbody.innerHTML = '';

        if (data.length === 0) {
            tbody.innerHTML = `<tr><td colspan="100" class="status-msg">검색 결과가 없습니다.</td></tr>`;
            return;
        }

        // 엑셀의 1행 컬럼을 기준으로 헤더 자동 생성 (브랜드, 품번, 차명, 비고)
        const headers = Object.keys(data[0]);
        const trHead = document.createElement('tr');
        headers.forEach(h => { 
            const th = document.createElement('th'); 
            th.textContent = h; 
            trHead.appendChild(th); 
        });
        thead.appendChild(trHead);

        // 데이터 행 매핑
        data.forEach(row => {
            const trBody = document.createElement('tr');
            headers.forEach(h => { 
                const td = document.createElement('td'); 
                td.textContent = row[h]; 
                trBody.appendChild(td); 
            });
            tbody.appendChild(trBody);
        });
    }
</script>
</body>
</html>
